name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o bin/kuberneet ./cmd/kuberneet

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kuberneet-linux-amd64
          path: bin/kuberneet

  manifest-scan:
    name: Manifest Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: kuberneet-linux-amd64
          path: bin

      - name: Make executable
        run: chmod +x bin/kuberneet

      - name: Scan deployment manifests
        run: |
          ./bin/kuberneet scan --manifest deploy/admission-webhook.yaml --output json || true
        continue-on-error: true