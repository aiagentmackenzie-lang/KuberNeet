apiVersion: v1
kind: Namespace
metadata:
  name: kuberneet-system
  labels:
    app.kubernetes.io/name: kuberneet
    app.kubernetes.io/component: admission-webhook

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuberneet-webhook
  namespace: kuberneet-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuberneet-webhook
rules:
- apiGroups: [""]
  resources: ["pods", "deployments", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuberneet-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuberneet-webhook
subjects:
- kind: ServiceAccount
  name: kuberneet-webhook
  namespace: kuberneet-system

---
apiVersion: v1
kind: Secret
metadata:
  name: kuberneet-webhook-certs
  namespace: kuberneet-system
  labels:
    app.kubernetes.io/name: kuberneet
type: kubernetes.io/tls
data:
  tls.crt: "${TLS_CRT_B64}"
  tls.key: "${TLS_KEY_B64}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuberneet-webhook
  namespace: kuberneet-system
  labels:
    app.kubernetes.io/name: kuberneet
    app.kubernetes.io/component: admission-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kuberneet
      app.kubernetes.io/component: admission-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kuberneet
        app.kubernetes.io/component: admission-webhook
    spec:
      serviceAccountName: kuberneet-webhook
      containers:
      - name: webhook
        image: ghcr.io/raphael/kuberneet-webhook:v0.1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8443
          name: webhook
        - containerPort: 8080
          name: health
        command:
        - /kuberneet
        - webhook
        - --port=8443
        - --cert=/etc/webhook/certs/tls.crt
        - --key=/etc/webhook/certs/tls.key
        - --mutate=true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: webhook-certs
          mountPath: /etc/webhook/certs
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: webhook-certs
        secret:
          secretName: kuberneet-webhook-certs

---
apiVersion: v1
kind: Service
metadata:
  name: kuberneet-webhook
  namespace: kuberneet-system
  labels:
    app.kubernetes.io/name: kuberneet
    app.kubernetes.io/component: admission-webhook
spec:
  ports:
  - port: 443
    targetPort: 8443
    name: webhook
  selector:
    app.kubernetes.io/name: kuberneet
    app.kubernetes.io/component: admission-webhook

---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kuberneet-validating-webhook
  labels:
    app.kubernetes.io/name: kuberneet
webhooks:
- name: validate.pod.kuberneet.io
  admissionReviewVersions: ["v1", "v1beta1"]
  failurePolicy: Fail
  sideEffects: None
  clientConfig:
    service:
      name: kuberneet-webhook
      namespace: kuberneet-system
      path: "/validate"
    caBundle: "${CA_BUNDLE_B64}"
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["pods"]
    scope: Namespaced
- name: validate.deployment.kuberneet.io
  admissionReviewVersions: ["v1", "v1beta1"]
  failurePolicy: Fail
  sideEffects: None
  clientConfig:
    service:
      name: kuberneet-webhook
      namespace: kuberneet-system
      path: "/validate"
    caBundle: "${CA_BUNDLE_B64}"
  rules:
  - apiGroups: ["apps"]
    apiVersions: ["v1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    scope: Namespaced

---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kuberneet-mutating-webhook
  labels:
    app.kubernetes.io/name: kuberneet
webhooks:
- name: mutate.pod.kuberneet.io
  admissionReviewVersions: ["v1", "v1beta1"]
  failurePolicy: Fail
  sideEffects: None
  clientConfig:
    service:
      name: kuberneet-webhook
      namespace: kuberneet-system
      path: "/mutate"
    caBundle: "${CA_BUNDLE_B64}"
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["pods"]
    scope: Namespaced
